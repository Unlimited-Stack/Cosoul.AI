services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces:cached
      # 持久化 Claude Code 认证 + 聊天历史（rebuild 不丢失）
      - claude-code-data:/home/node/.claude
      # 持久化 VS Code Server 整个目录（扩展 + 缓存 + bin）
      - vscode-server:/home/node/.vscode-server
    environment:
      # 容器级代理（构建阶段 / 非 VS Code 进程也能用）
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - http_proxy=http://host.docker.internal:7897
      - https_proxy=http://host.docker.internal:7897
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    # 允许容器访问宿主机网络上的代理
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sleep infinity
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN

volumes:
  claude-code-data:
    # Claude Code 认证 + 配置，rebuild 不丢失
  vscode-server:
    # VS Code 扩展缓存，rebuild 后秒开